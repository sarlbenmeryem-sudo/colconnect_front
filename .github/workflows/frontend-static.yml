name: Analyze the frontend (static)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  static-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Basic sanity (accept assets/ OR css+js)
        run: |
          set -euo pipefail
          echo "Root:"
          ls -la
          test -f index.html || { echo "❌ index.html missing at repo root"; exit 1; }

          if [ -d assets ]; then
            echo "✅ assets/ found"
          elif [ -d css ] && [ -d js ]; then
            echo "✅ css/ + js/ found"
          else
            echo "❌ Expected either assets/ OR css/ and js/ directories"
            exit 1
          fi

      - name: List key assets (non-fatal)
        run: |
          set -euo pipefail
          echo "HTML:"
          find . -maxdepth 3 -type f -name "*.html" | sed 's|^\./||' | head -n 200 || true
          echo "CSS:"
          find . -maxdepth 4 -type f -name "*.css" | sed 's|^\./||' | head -n 200 || true
          echo "JS:"
          find . -maxdepth 4 -type f -name "*.js" | sed 's|^\./||' | head -n 200 || true

      - name: Lightweight secret scan (non-fatal)
        run: |
          set -euo pipefail
          (grep -RniE "(mongodb\+srv://|BEGIN PRIVATE KEY|AKIA[0-9A-Z]{16}|JWT_SECRET\s*=)" . \
            --exclude-dir=.git --exclude="*.png" --exclude="*.jpg" --exclude="*.webp" || true)
          echo "✅ Done"
